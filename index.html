<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Consulta de Saldos Diários</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#080e1a',
                        darkCard: '#0d1626',
                        darkCard2: '#111e33',
                        darkBorder: '#1e3050',
                        brandBlue: '#3b82f6',
                        brandGreen: '#10b981',
                        brandAmber: '#f59e0b',
                        brandRed: '#ef4444',
                    }
                }
            }
        }
    </script>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: #080e1a; 
            color: #e2e8f0; 
            background-image: 
                radial-gradient(ellipse at 20% 0%, rgba(59,130,246,0.07) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 100%, rgba(6,182,212,0.05) 0%, transparent 60%);
        }
        
        h1, h2, h3, .font-display { font-family: 'Syne', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace !important; }

        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #080e1a; }
        ::-webkit-scrollbar-thumb { background: #1e3050; border-radius: 4px; }

        .result-card { transition: all 0.25s cubic-bezier(0.4,0,0.2,1); cursor: pointer; }
        .result-card:hover { transform: translateY(-4px); box-shadow: 0 20px 40px -10px rgba(0,0,0,0.7), 0 0 0 1px rgba(59,130,246,0.3); }

        #liquidacaoPanel {
            position: relative;
            border-radius: 20px;
            border: 1px solid rgba(245,158,11,0.25);
            background: linear-gradient(135deg, #0d1626 0%, #0f1e38 50%, #0d1626 100%);
        }

        .liq-table { width: 100%; border-collapse: separate; border-spacing: 0; }
        .liq-table thead tr th {
            padding: 8px 12px;
            text-align: left;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            color: #475569;
            background: rgba(17,30,51,0.8);
            border-bottom: 1px solid #1e3050;
        }

        .liq-table tbody td {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(30,48,80,0.4);
        }

        .value-chip {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 5px;
            display: inline-block;
        }
        .chip-before { background: rgba(100,116,139,0.12); color: #94a3b8; }
        .chip-liq    { background: rgba(239,68,68,0.10);   color: #f87171; }
        .chip-after  { background: rgba(16,185,129,0.10);  color: #34d399; }

        .mini-bar-track { height: 4px; border-radius: 3px; background: rgba(255,255,255,0.05); width: 60px; overflow: hidden; display: inline-block; vertical-align: middle; }
        .mini-bar-fill { height: 100%; border-radius: 3px; }

        .pulse-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #f59e0b; animation: pulse-amber 1.8s infinite; }
        @keyframes pulse-amber { 0% { box-shadow: 0 0 0 0 rgba(245,158,11,0.6); } 70% { box-shadow: 0 0 0 8px rgba(245,158,11,0); } 100% { box-shadow: 0 0 0 0 rgba(245,158,11,0); } }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col">

    <header style="background: rgba(13,22,38,0.95); border-bottom: 1px solid #1e3050; backdrop-filter: blur(12px);" class="sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div style="background: linear-gradient(135deg, #1d4ed8, #0891b2);" class="text-white p-2.5 rounded-xl">
                    <i class="fas fa-database text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-display font-bold text-white">Consulta Diária de Saldos</h1>
                    <p class="text-xs font-mono text-slate-500">Conexão Direta: Google Sheets</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <div id="statusBadge" class="hidden items-center gap-2 px-3 py-1.5 rounded-full text-sm font-medium" style="background: rgba(16,185,129,0.1); color: #10b981; border: 1px solid rgba(16,185,129,0.2);">
                    <i class="fas fa-circle text-[10px] animate-pulse"></i>
                    <span id="lastUpdateText">ao vivo</span>
                </div>
                <button id="refreshBtn" onclick="loadData()" class="text-white px-4 py-2 rounded-xl font-semibold text-sm transition-all" style="background: linear-gradient(135deg, #2563eb, #0891b2);">
                    <i class="fas fa-sync-alt" id="refreshIcon"></i> Atualizar
                </button>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto px-4 py-8 w-full">

        <div id="uploadSection" class="rounded-2xl p-10 mb-8 text-center" style="background: #0d1626; border: 1px solid #1e3050;">
            <div class="flex flex-col items-center justify-center space-y-5">
                <div id="loadingIcon" class="text-5xl animate-spin text-blue-500"><i class="fas fa-circle-notch"></i></div>
                <h2 class="text-xl font-display font-bold text-white" id="loadingTitle">Sincronizando com a Planilha...</h2>
            </div>
        </div>

        <div id="dashboardContent" class="hidden space-y-8">

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="rounded-2xl p-6" style="background: #0d1626; border: 1px solid #1e3050;">
                    <p class="text-[10px] font-semibold uppercase text-slate-500 mb-1">Saldo Total</p>
                    <h3 id="kpiTotalSaldo" class="text-2xl font-display font-bold text-white tracking-tight">R$ 0,00</h3>
                </div>
                <div class="rounded-2xl p-6" style="background: #0d1626; border: 1px solid #1e3050;">
                    <p class="text-[10px] font-semibold uppercase text-slate-500 mb-1">Processos</p>
                    <h3 id="kpiTotalProcessos" class="text-2xl font-display font-bold text-white tracking-tight">0</h3>
                </div>
                <div class="rounded-2xl p-6" style="background: #0d1626; border: 1px solid #1e3050;">
                    <p class="text-[10px] font-semibold uppercase text-slate-500 mb-1">Favorecidos</p>
                    <h3 id="kpiTotalFavorecidos" class="text-2xl font-display font-bold text-white tracking-tight">0</h3>
                </div>
            </div>

            <div id="liquidacaoPanel" class="hidden p-5">
                <div class="flex items-center gap-3 mb-4">
                    <span class="inline-flex items-center gap-2 bg-amber-500/10 border border-amber-500/25 text-amber-500 font-bold text-[11px] uppercase px-3 py-1 rounded-full">
                        <span class="pulse-dot"></span> Liquidações do Dia
                    </span>
                    <span id="liqCountBadge" class="text-xs px-2 py-1 rounded-md bg-red-500/10 text-red-400 font-mono">0 ocorrências</span>
                </div>
                <div id="liqCardsContainer" class="overflow-x-auto rounded-xl"></div>
            </div>

            <div class="rounded-2xl p-6" style="background: #0d1626; border: 1px solid #1e3050;">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input type="text" id="searchGlobal" placeholder="🔍 Busca geral..." class="w-full px-4 py-2.5 rounded-xl bg-[#111e33] border border-[#1e3050] text-white text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    <input type="text" id="searchProcesso" placeholder="📄 Nº Processo..." class="w-full px-4 py-2.5 rounded-xl bg-[#111e33] border border-[#1e3050] text-white text-sm outline-none">
                    <input type="text" id="searchFavorecido" placeholder="👥 Favorecido (Busca Exata)..." class="w-full px-4 py-2.5 rounded-xl bg-[#111e33] border border-[#1e3050] text-white text-sm outline-none">
                </div>
            </div>

            <div id="resultsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5"></div>
            <div id="emptyState" class="hidden flex flex-col items-center justify-center py-16 text-slate-500">
                <i class="fas fa-box-open text-5xl mb-4"></i>
                <p>Nenhum resultado encontrado para os filtros aplicados.</p>
            </div>
        </div>
    </main>

    <script>
        // URL DA SUA PLANILHA PUBLICADA EM CSV
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSZQ4K9szuj6x6mVT-xzyk829q1THHXBhugH2xUK5tkAC36tDjTsLPNhDKmdMS29xhZwakRVZotrKwL/pub?gid=0&single=true&output=csv";

        let allData = [];
        let filteredData = [];
        let headers = [];
        window.allMatches = [];

        let IDX_FAVORECIDO = 7;
        let IDX_PROCESSO = 12;
        let IDX_SALDO = 17;

        // Índices das colunas de liquidação (baseado no seu arquivo CSV)
        const IDX_LIQ_FAV = 19;
        const IDX_LIQ_PROC = 20;
        const IDX_LIQ_ELEM = 21;
        const IDX_LIQ_SUBIT = 22;
        const IDX_LIQ_TOTAL = 25;

        function parseCSV(text) {
            return text.split('\n').map(line => {
                const result = []; let cur = ''; let inQ = false;
                for (let i = 0; i < line.length; i++) {
                    const c = line[i];
                    if (c === '"') inQ = !inQ;
                    else if (c === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
                    else cur += c;
                }
                result.push(cur.trim());
                return result;
            }).filter(r => r.length > 1);
        }

        function parseBRValue(v) {
            v = String(v || '').replace(/R\$\s*/gi, '').trim();
            if (!v || v === '-' || v === '—') return 0;
            if (v.includes(',') && v.includes('.')) v = v.replace(/\./g, '').replace(',', '.');
            else if (v.includes(',')) v = v.replace(',', '.');
            return parseFloat(v) || 0;
        }

        function formatCurrency(v) {
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);
        }

        async function loadData() {
            const btn = document.getElementById('refreshBtn'), icon = document.getElementById('refreshIcon');
            btn.disabled = true; icon.className = 'fas fa-sync-alt animate-spin';
            
            try {
                // Adicionamos um parâmetro de tempo para evitar cache e sempre pegar o dado mais novo
                const resp = await fetch(CSV_URL + '&t=' + Date.now());
                const text = await resp.text();
                const rows = parseCSV(text);
                
                headers = rows[0];
                allData = rows.slice(1).filter(r => r[IDX_PROCESSO] && !String(r[IDX_FAVORECIDO]).toLowerCase().includes('total'));
                
                // Mapeia as liquidações
                window.allMatches = rows.slice(1).filter(r => r[IDX_LIQ_TOTAL] && parseBRValue(r[IDX_LIQ_TOTAL]) > 0).map(r => {
                    const sAtual = parseBRValue(r[IDX_SALDO]);
                    const sLiq = parseBRValue(r[IDX_LIQ_TOTAL]);
                    return {
                        favorecido: r[IDX_LIQ_FAV],
                        processo: r[IDX_LIQ_PROC],
                        elem: r[IDX_LIQ_ELEM],
                        sub: r[IDX_LIQ_SUBIT],
                        liquidado: sLiq,
                        saldoAntes: sAtual + sLiq,
                        saldoDepois: sAtual,
                        pct: (sLiq / (sAtual + sLiq + 0.01)) * 100
                    };
                });

                applyFilters();
                
                document.getElementById('uploadSection').style.display = 'none';
                document.getElementById('dashboardContent').classList.remove('hidden');
                document.getElementById('statusBadge').classList.remove('hidden');
                document.getElementById('statusBadge').classList.add('flex');
                document.getElementById('lastUpdateText').textContent = new Date().toLocaleTimeString('pt-BR');
            } catch (e) { 
                console.error(e);
                alert("Erro ao ler planilha. Verifique se ela está publicada como CSV.");
            }
            btn.disabled = false; icon.className = 'fas fa-sync-alt';
        }

        function applyFilters() {
            const g = document.getElementById('searchGlobal').value.toLowerCase().trim();
            const p = document.getElementById('searchProcesso').value.toLowerCase().trim();
            const f = document.getElementById('searchFavorecido').value.toLowerCase().trim();

            filteredData = allData.filter(r => {
                const proc = String(r[IDX_PROCESSO]).toLowerCase();
                const fav = String(r[IDX_FAVORECIDO]).toLowerCase();
                const tudo = r.join(' ').toLowerCase();
                return proc.includes(p) && fav.includes(f) && tudo.includes(g);
            });

            const filteredLiq = window.allMatches.filter(m => {
                const fav = m.favorecido.toLowerCase();
                const proc = m.processo.toLowerCase();
                return fav.includes(f) && proc.includes(p) && (fav + proc).includes(g);
            });

            renderLiquidacaoPanel(filteredLiq);
            renderDashboard();
        }

        function renderLiquidacaoPanel(matches) {
            const panel = document.getElementById('liquidacaoPanel');
            const container = document.getElementById('liqCardsContainer');
            
            if (matches.length === 0) { panel.classList.add('hidden'); return; }
            panel.classList.remove('hidden');
            document.getElementById('liqCountBadge').textContent = matches.length + ' ocorrências';

            let html = `<table class="liq-table">
                <thead><tr><th>Favorecido</th><th>Elemento · Processo</th><th class="text-right">Anterior</th><th class="text-right">Liquidado</th><th class="text-right">Atual</th><th class="text-right">Consumo</th></tr></thead>
                <tbody>`;
            
            matches.forEach(m => {
                const barColor = m.pct > 80 ? '#ef4444' : '#10b981';
                html += `<tr>
                    <td><p class="text-sm font-semibold text-white">${m.favorecido}</p></td>
                    <td><span class="text-[11px] font-mono px-2 py-1 rounded bg-cyan-500/10 text-cyan-400 border border-cyan-500/20">${m.elem}/${m.sub} · ${m.processo}</span></td>
                    <td class="text-right"><span class="value-chip chip-before">${formatCurrency(m.saldoAntes)}</span></td>
                    <td class="text-right"><span class="value-chip chip-liq">− ${formatCurrency(m.liquidado)}</span></td>
                    <td class="text-right"><span class="value-chip chip-after">${formatCurrency(m.saldoDepois)}</span></td>
                    <td class="text-right"><span class="text-[11px] font-mono mr-2">${m.pct.toFixed(1)}%</span><div class="mini-bar-track"><div class="mini-bar-fill" style="width:${m.pct}%; background:${barColor}"></div></div></td>
                </tr>`;
            });
            container.innerHTML = html + `</tbody></table>`;
        }

        function renderDashboard() {
            const container = document.getElementById('resultsContainer');
            const empty = document.getElementById('emptyState');
            container.innerHTML = '';

            let total = 0;
            if (filteredData.length === 0) { empty.classList.remove('hidden'); return; }
            empty.classList.add('hidden');

            filteredData.forEach((r, i) => {
                const proc = r[IDX_PROCESSO], fav = r[IDX_FAVORECIDO], saldo = parseBRValue(r[IDX_SALDO]);
                total += saldo;
                const card = document.createElement('div');
                card.className = 'result-card rounded-2xl p-5 bg-[#0d1626] border border-[#1e3050] flex flex-col';
                card.innerHTML = `
                    <div class="mb-4">
                        <p class="text-[10px] font-bold text-slate-500 uppercase mb-1">Processo</p>
                        <h4 class="text-white font-display font-bold">${proc}</h4>
                    </div>
                    <div class="mb-5 flex-grow">
                        <p class="text-[10px] font-bold text-slate-500 uppercase mb-1">Favorecido</p>
                        <p class="text-sm text-slate-400 line-clamp-2">${fav}</p>
                    </div>
                    <div class="pt-4 border-t border-slate-800">
                        <p class="text-lg font-mono font-bold ${saldo >= 0 ? 'text-emerald-400' : 'text-rose-400'}">${formatCurrency(saldo)}</p>
                    </div>`;
                container.appendChild(card);
            });
            
            document.getElementById('kpiTotalSaldo').textContent = formatCurrency(total);
            document.getElementById('kpiTotalProcessos').textContent = filteredData.length;
            document.getElementById('kpiTotalFavorecidos').textContent = new Set(filteredData.map(r => r[IDX_FAVORECIDO])).size;
        }

        document.querySelectorAll('input').forEach(i => i.addEventListener('input', applyFilters));
        loadData();
    </script>
</body>
</html>
