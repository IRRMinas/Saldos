<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Consulta de Saldos Diários</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#080e1a',
                        darkCard: '#0d1626',
                        darkBorder: '#1e3050',
                        brandBlue: '#3b82f6',
                        brandGreen: '#10b981',
                        brandAmber: '#f59e0b',
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: #080e1a; 
            color: #e2e8f0; 
            background-image: radial-gradient(ellipse at 20% 0%, rgba(59,130,246,0.07) 0%, transparent 60%);
        }
        .font-display { font-family: 'Syne', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace !important; }
        
        #liquidacaoPanel {
            position: relative;
            border-radius: 20px;
            border: 1px solid rgba(245,158,11,0.25);
            background: linear-gradient(135deg, #0d1626 0%, #0f1e38 50%, #0d1626 100%);
        }

        .liq-table { width: 100%; border-collapse: separate; border-spacing: 0; }
        .liq-table thead th {
            padding: 10px 12px; text-align: left; font-size: 10px; font-weight: 700;
            text-transform: uppercase; color: #475569; background: rgba(17,30,51,0.8);
            border-bottom: 1px solid #1e3050;
        }
        .liq-table tbody td { padding: 12px 12px; border-bottom: 1px solid rgba(30,48,80,0.4); }
        .value-chip { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; padding: 3px 8px; border-radius: 5px; display: inline-block; }
        .chip-before { background: rgba(100,116,139,0.12); color: #94a3b8; }
        .chip-liq    { background: rgba(239,68,68,0.10);   color: #f87171; }
        .chip-after  { background: rgba(16,185,129,0.10);  color: #34d399; }
        
        .mini-bar-track { height: 4px; border-radius: 3px; background: rgba(255,255,255,0.05); width: 60px; overflow: hidden; display: inline-block; vertical-align: middle; }
        .mini-bar-fill { height: 100%; border-radius: 3px; }
        .pulse-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #f59e0b; animation: pulse 1.8s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(245,158,11,0.6); } 70% { box-shadow: 0 0 0 8px rgba(245,158,11,0); } 100% { box-shadow: 0 0 0 0 rgba(245,158,11,0); } }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col">

    <header class="sticky top-0 z-10 bg-darkBg/95 border-b border-darkBorder backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="bg-gradient-to-br from-blue-600 to-cyan-600 p-2.5 rounded-xl shadow-lg shadow-blue-900/20">
                    <i class="fas fa-database text-xl text-white"></i>
                </div>
                <div>
                    <h1 class="text-xl font-display font-bold text-white uppercase tracking-tight">Dashboard de Saldos</h1>
                    <p class="text-[10px] font-mono text-slate-500 uppercase tracking-widest">Sincronização Direta CSV</p>
                </div>
            </div>
            <button onclick="loadData()" class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2 rounded-xl font-semibold text-sm transition-all flex items-center gap-2">
                <i class="fas fa-sync-alt" id="refreshIcon"></i> ATUALIZAR
            </button>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto px-4 py-8 w-full space-y-8">
        
        <div id="loadingScreen" class="rounded-2xl p-20 text-center bg-darkCard border border-darkBorder">
            <i class="fas fa-circle-notch animate-spin text-4xl text-blue-500 mb-4"></i>
            <h2 class="text-lg font-display text-white">A carregar dados da folha...</h2>
        </div>

        <div id="dashboardContent" class="hidden space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-darkCard border border-darkBorder p-6 rounded-2xl">
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Saldo Total Geral</p>
                    <h3 id="kpiSaldo" class="text-2xl font-display font-bold text-white tracking-tight">R$ 0,00</h3>
                </div>
                <div class="bg-darkCard border border-darkBorder p-6 rounded-2xl">
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Processos Ativos</p>
                    <h3 id="kpiProc" class="text-2xl font-display font-bold text-white tracking-tight">0</h3>
                </div>
                <div class="bg-darkCard border border-darkBorder p-6 rounded-2xl">
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Total Favorecidos</p>
                    <h3 id="kpiFav" class="text-2xl font-display font-bold text-white tracking-tight">0</h3>
                </div>
            </div>

            <div id="liquidacaoPanel" class="hidden p-6">
                <div class="flex items-center gap-3 mb-6">
                    <span class="bg-amber-500/10 border border-amber-500/20 text-amber-500 text-[10px] font-bold uppercase px-3 py-1.5 rounded-full flex items-center gap-2">
                        <span class="pulse-dot"></span> Liquidações Detectadas no Dia
                    </span>
                    <span id="liqBadge" class="text-xs font-mono font-bold bg-red-500/10 text-red-400 px-2 py-1 rounded">0</span>
                </div>
                <div id="liqTableWrap" class="liq-table-wrap">
                    </div>
            </div>

            <div class="bg-darkCard border border-darkBorder p-6 rounded-2xl">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input type="text" id="filterGlobal" placeholder="🔍 Pesquisa rápida..." class="bg-[#111e33] border border-darkBorder rounded-xl px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                    <input type="text" id="filterProc" placeholder="📄 Nº Processo..." class="bg-[#111e33] border border-darkBorder rounded-xl px-4 py-2.5 text-sm outline-none">
                    <input type="text" id="filterFav" placeholder="👥 Favorecido..." class="bg-[#111e33] border border-darkBorder rounded-xl px-4 py-2.5 text-sm outline-none">
                </div>
            </div>

            <div id="cardsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5"></div>
        </div>
    </main>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSZQ4K9szuj6x6mVT-xzyk829q1THHXBhugH2xUK5tkAC36tDjTsLPNhDKmdMS29xhZwakRVZotrKwL/pub?gid=0&single=true&output=csv";

        let allData = [];
        let filteredData = [];
        window.allLiq = [];

        // Mapeamento exato da sua folha (Base 0)
        const H_FAV = 7, M_PROC = 12, R_SALDO = 17; // Main
        const T_FAV = 19, U_PROC = 20, V_ELEM = 21, W_SUB = 22, Z_TOTAL = 25; // Liq

        // Parser Robusto para CSV (Lida com vírgulas dentro de aspas)
        function parseCSV(text) {
            const lines = text.split(/\r?\n/);
            return lines.map(line => {
                const row = [];
                let cell = '', inQuotes = false;
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) {
                        row.push(cell.trim()); cell = '';
                    } else cell += char;
                }
                row.push(cell.trim());
                return row;
            }).filter(row => row.length > 5);
        }

        function parseNum(v) {
            v = String(v || '').replace(/R\$\s*/gi, '').trim();
            if (!v || v === '-' || v === '—') return 0;
            if (v.includes(',') && v.includes('.')) v = v.replace(/\./g, '').replace(',', '.');
            else if (v.includes(',')) v = v.replace(',', '.');
            return parseFloat(v) || 0;
        }

        function fmt(v) { return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v); }

        async function loadData() {
            const icon = document.getElementById('refreshIcon');
            icon.classList.add('animate-spin');
            
            try {
                const resp = await fetch(CSV_URL + '&cache=' + Date.now());
                const data = parseCSV(await resp.text());
                
                // Dados Principais (Ignora cabeçalho e linhas de Total)
                allData = data.slice(1).filter(r => r[M_PROC] && r[M_PROC] !== 'Total' && r[H_FAV] !== 'Total');

                // Mapeamento de Liquidações (Coluna Z > 0)
                window.allLiq = allData.filter(r => parseNum(r[Z_TOTAL]) > 0).map(r => {
                    const sa = parseNum(r[R_SALDO]), liq = parseNum(r[Z_TOTAL]);
                    return { fav: r[T_FAV], proc: r[U_PROC], elem: r[V_ELEM], sub: r[W_SUB], val: liq, ant: sa + liq, atu: sa, pct: (liq/(sa+liq+0.01))*100 };
                });

                applyFilters();
                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('dashboardContent').classList.remove('hidden');
            } catch (e) { alert("Erro ao carregar folha de cálculo."); }
            icon.classList.remove('animate-spin');
        }

        function applyFilters() {
            const g = document.getElementById('filterGlobal').value.toLowerCase().trim();
            const p = document.getElementById('filterProc').value.toLowerCase().trim();
            const f = document.getElementById('filterFav').value.toLowerCase().trim();

            filteredData = allData.filter(r => {
                const proc = String(r[M_PROC]).toLowerCase();
                const fav = String(r[H_FAV]).toLowerCase();
                // Filtro "Cemig" corrigido: apenas nome ou processo
                const target = fav + " " + proc;
                return proc.includes(p) && fav.includes(f) && target.includes(g);
            });

            const liqFiltro = window.allLiq.filter(m => (m.fav + m.proc).toLowerCase().includes(g) && m.fav.toLowerCase().includes(f) && m.proc.toLowerCase().includes(p));
            
            renderLiq(liqFiltro);
            renderGrid();
        }

        function renderLiq(m) {
            const panel = document.getElementById('liquidacaoPanel');
            if (m.length === 0) { panel.classList.add('hidden'); return; }
            panel.classList.remove('hidden');
            document.getElementById('liqBadge').textContent = m.length;
            
            let h = `<table class="liq-table"><thead><tr><th>Favorecido</th><th>Elemento / Processo</th><th class="text-right">Anterior</th><th class="text-right">Liquidado</th><th class="text-right">Atual</th><th class="text-right">Consumo</th></tr></thead><tbody>`;
            m.forEach(i => {
                const color = i.pct > 85 ? '#ef4444' : '#10b981';
                h += `<tr>
                    <td><p class="text-sm font-semibold text-white">${i.fav}</p></td>
                    <td><span class="text-[11px] font-mono px-2 py-1 rounded bg-blue-500/10 text-blue-400 border border-blue-500/20">${i.elem}/${i.sub} · ${i.proc}</span></td>
                    <td class="text-right"><span class="value-chip chip-before">${fmt(i.ant)}</span></td>
                    <td class="text-right"><span class="value-chip chip-liq">− ${fmt(i.val)}</span></td>
                    <td class="text-right"><span class="value-chip chip-after">${fmt(i.atu)}</span></td>
                    <td class="text-right"><span class="text-[11px] font-mono mr-2">${i.pct.toFixed(1)}%</span><div class="mini-bar-track"><div class="mini-bar-fill" style="width:${i.pct}%; background:${color}"></div></div></td>
                </tr>`;
            });
            document.getElementById('liqTableWrap').innerHTML = h + `</tbody></table>`;
        }

        function renderGrid() {
            const grid = document.getElementById('cardsGrid');
            grid.innerHTML = '';
            let total = 0;
            filteredData.forEach(r => {
                const s = parseNum(r[R_SALDO]); total += s;
                const card = document.createElement('div');
                card.className = 'bg-darkCard border border-darkBorder p-5 rounded-2xl hover:translate-y-[-4px] transition-all cursor-pointer';
                card.innerHTML = `
                    <p class="text-[10px] font-bold text-slate-500 uppercase mb-1">Processo</p>
                    <h4 class="text-white font-display font-bold mb-3">${r[M_PROC]}</h4>
                    <p class="text-[10px] font-bold text-slate-500 uppercase mb-1">Favorecido</p>
                    <p class="text-sm text-slate-400 line-clamp-1 mb-4">${r[H_FAV]}</p>
                    <div class="pt-4 border-t border-darkBorder">
                        <p class="text-lg font-mono font-bold ${s >= 0 ? 'text-emerald-400' : 'text-rose-400'}">${fmt(s)}</p>
                    </div>`;
                grid.appendChild(card);
            });
            document.getElementById('kpiSaldo').textContent = fmt(total);
            document.getElementById('kpiProc').textContent = filteredData.length;
            document.getElementById('kpiFav').textContent = new Set(filteredData.map(r => r[H_FAV])).size;
        }

        document.querySelectorAll('input').forEach(i => i.addEventListener('input', applyFilters));
        loadData();
    </script>
</body>
</html>
